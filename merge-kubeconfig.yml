---
# Merge this cluster's kubeconfig into local ~/.kube/config and set as current context.
# Run after cluster is up: ansible-playbook -i inventory.ini merge-kubeconfig.yml
# Does not overwrite your existing config; adds this cluster with a unique name and switches to it.

- name: Fetch kubeconfig from first control-plane node
  hosts: "{{ groups['controlplane'][0] }}"
  gather_facts: no
  vars:
    kubeconfig_fetched: "/tmp/{{ kubeconfig_merge_cluster_name }}-kubeconfig"
  tasks:
    - name: Fetch admin kubeconfig to control machine
      fetch:
        src: "/home/{{ ansible_user }}/.kube/config"
        dest: "{{ kubeconfig_fetched }}"
        flat: yes
      become: yes
      when: not ansible_check_mode

- name: Merge into local kubeconfig and set current context
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    ansible_become: false
    kubeconfig_fetched: "/tmp/{{ kubeconfig_merge_cluster_name }}-kubeconfig"
    kubeconfig_local: "{{ ansible_env.HOME }}/.kube/config"
    new_context: "kubernetes-admin@{{ kubeconfig_merge_cluster_name }}"
  tasks:
    - name: Ensure .kube exists locally
      file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0700'

    - name: Rename cluster and context in fetched config (avoid overwriting existing)
      replace:
        path: "{{ kubeconfig_fetched }}"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '^current-context: .*', replace: 'current-context: {{ new_context }}' }
        - { regexp: 'name: kubernetes-admin@kubernetes', replace: 'name: {{ new_context }}' }
        - { regexp: 'cluster: kubernetes', replace: 'cluster: {{ kubeconfig_merge_cluster_name }}' }
        - { regexp: '^  name: kubernetes$', replace: '  name: {{ kubeconfig_merge_cluster_name }}' }
      when: not ansible_check_mode

    - name: Merge into local kubeconfig (add cluster, keep existing)
      shell: |
        if [ -f "{{ kubeconfig_local }}" ]; then
          KUBECONFIG="{{ kubeconfig_local }}:{{ kubeconfig_fetched }}" kubectl config view --flatten --minify=false > "{{ kubeconfig_local }}.merged"
          mv "{{ kubeconfig_local }}.merged" "{{ kubeconfig_local }}"
        else
          cp "{{ kubeconfig_fetched }}" "{{ kubeconfig_local }}"
        fi
      args:
        executable: /bin/bash
      changed_when: true
      timeout: 15
      when: not ansible_check_mode

    - name: Set current context to this cluster
      command: kubectl config use-context "{{ new_context }}"
      register: use_ctx
      changed_when: use_ctx.stdout is search('Switched')
      timeout: 10
      when: not ansible_check_mode

    - name: Remove temporary fetched config
      file:
        path: "{{ kubeconfig_fetched }}"
        state: absent
      when: not ansible_check_mode

    - name: Show current context
      command: kubectl config current-context
      register: current
      changed_when: false
      timeout: 5
      when: not ansible_check_mode

    - name: Confirm kubeconfig merged
      debug:
        msg: "Merged cluster '{{ kubeconfig_merge_cluster_name }}' into {{ kubeconfig_local }} and set current context to {{ current.stdout | default(new_context) }}"
      when: not ansible_check_mode
