[controlplane]
scs001072990-1 ansible_host=10.192.58.192

[workers]
scs001072990-2 ansible_host=10.192.58.226
scs001072990-3 ansible_host=10.192.58.235

[all:vars]
ansible_user=kubeadmin
# Project key. Run 'ansible' and 'ansible-playbook' from the repo root so keys/ resolves.
ansible_ssh_private_key_file=keys/id_k8s_homelab
ansible_become=yes
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
# Allow first-time SSH (no host key in known_hosts yet). Remove after keys are trusted.
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedAlgorithms=+ssh-rsa'
