---
# Verify Kubernetes networking at end of site.yml: nodes Ready, Calico ready, DNS works from a pod.
# Set verify_networking: false in group_vars to skip (e.g. for faster re-runs or CI).

- name: Wait for all nodes to be Ready (up to 120s for workers to finish joining)
  shell: |
    all_ready=false
    for i in $(seq 1 24); do
      lines=$(kubectl get nodes --no-headers 2>/dev/null)
      total=$(echo "$lines" | wc -l)
      ready=$(echo "$lines" | grep -c ' Ready ' || true)
      if [ "$total" -gt 0 ] && [ "$ready" -eq "$total" ]; then
        all_ready=true
        break
      fi
      sleep 5
    done
    kubectl get nodes --no-headers
    $all_ready
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nodes_out
  changed_when: false
  failed_when: nodes_out.rc != 0
  when: verify_networking | default(true) | bool

- name: Assert all nodes Ready
  assert:
    that:
      - nodes_out.stdout_lines | select('search', ' Ready ') | list | length == nodes_out.stdout_lines | length
    fail_msg: "Not all nodes are Ready after 120s. Run 'kubectl get nodes' to inspect."
  when: verify_networking | default(true) | bool

- name: Check calico-node pods are Ready
  command: kubectl get pods -n kube-system -l k8s-app=calico-node --no-headers
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_out
  changed_when: false
  failed_when: false
  when: verify_networking | default(true) | bool

- name: Assert all calico-node pods Running and Ready
  assert:
    that:
      - calico_out.stdout_lines | length > 0
      - calico_out.stdout_lines | select('search', ' Running ') | select('search', '1/1') | list | length == calico_out.stdout_lines | length
    fail_msg: "Not all calico-node pods are 1/1 Ready. Run 'kubectl get pods -n kube-system -l k8s-app=calico-node'."
  when: verify_networking | default(true) | bool

- name: Check CoreDNS pods exist and are Ready
  command: kubectl get pods -n kube-system -l k8s-app=kube-dns --no-headers
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: coredns_out
  changed_when: false
  failed_when: false
  when: verify_networking | default(true) | bool

- name: Assert CoreDNS pods Running and Ready
  assert:
    that:
      - coredns_out.stdout_lines | length > 0
      - coredns_out.stdout_lines | select('search', ' Running ') | select('search', '1/1') | list | length == coredns_out.stdout_lines | length
    fail_msg: "CoreDNS pods not all 1/1 Ready. Run 'kubectl get pods -n kube-system -l k8s-app=kube-dns'."
  when: verify_networking | default(true) | bool

- name: Remove any leftover DNS test pod from a previous run
  command: kubectl delete pod verify-networking-dns --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: verify_networking | default(true) | bool

- name: Create DNS test pod (nslookup kubernetes.default)
  command: >
    kubectl run verify-networking-dns
    --restart=Never
    --image=busybox:1.36
    --overrides={{ '{"spec":{"containers":[{"name":"verify-networking-dns","image":"busybox:1.36","command":["nslookup","kubernetes.default.svc.cluster.local"]}]}}' | quote }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: verify_networking | default(true) | bool

- name: Wait for DNS test pod to finish (max 45s)
  command: kubectl wait pod/verify-networking-dns --for=jsonpath='{.status.phase}'=Succeeded --timeout=45s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: dns_wait
  failed_when: false
  when: verify_networking | default(true) | bool

- name: Get DNS test pod logs
  command: kubectl logs verify-networking-dns
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: dns_logs
  changed_when: false
  when: verify_networking | default(true) | bool

- name: Delete DNS test pod
  command: kubectl delete pod verify-networking-dns --ignore-not-found=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: verify_networking | default(true) | bool

- name: Show DNS test pod output (for debugging failures)
  debug:
    msg: "DNS test pod stdout:\n{{ dns_logs.stdout | default('(no output)') }}\nstderr/rc: {{ dns_logs.stderr | default('') }} {{ dns_logs.rc | default('') }}"
  when: verify_networking | default(true) | bool and dns_logs is defined

- name: Assert DNS resolution succeeded (no timeout from pod)
  assert:
    that: "'connection timed out' not in (dns_logs.stdout | default('')) and 'Address' in (dns_logs.stdout | default(''))"
    fail_msg: "Pod-to-pod DNS failed (connection timed out or no Address). Check Calico/VXLAN firewall (UDP 4789, ufw default allow routed), CoreDNS, and that the vxlan kernel module is loaded (common role loads it). If rules are correct, a one-time reboot of nodes can clear stale iptables/kernel state."
  when: verify_networking | default(true) | bool

- name: Networking verification passed
  debug:
    msg: "Networking OK: nodes Ready, Calico ready, CoreDNS ready, DNS from pod works."
  when: verify_networking | default(true) | bool
