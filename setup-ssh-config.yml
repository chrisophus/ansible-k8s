---
- name: Setup SSH config for easy access
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Build SSH config block from inventory
      set_fact:
        local_ssh_config_block: "{{ (local_ssh_config_block | default('')) + '  Host ' + item + '\n    HostName ' + (hostvars[item].ansible_host | default(item)) + '\n    User ' + (hostvars[item].ansible_user | default(hostvars[groups['all'][0]].ansible_user)) + '\n    IdentityFile ' + (hostvars[item].ansible_ssh_private_key_file | default(hostvars[groups['all'][0]].ansible_ssh_private_key_file | default('~/.ssh/id_rsa'))) + '\n\n' }}"
      loop: "{{ groups['all'] }}"

    - name: Add SSH config for homelab nodes
      blockinfile:
        path: "~/.ssh/config"
        create: yes
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED BLOCK - HOMELAB"
        block: "{{ local_ssh_config_block }}"